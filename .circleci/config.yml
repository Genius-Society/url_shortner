version: 2
jobs:
  build:
    docker:
      - image: maven:3.6.2-jdk-11
    steps:
      - checkout
      - run:
          name: Build
          command: |
            mvn clean
            mvn package
      - run:
          name: Deployment
          command: |
            if [ "${CIRCLE_BRANCH}" = "master" ]; then
              chmod 700 id.rsa
              scp -i id.rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ./target/*.war tomcat@assignment.econveyir.com.au:/opt/bitnami/apache-tomcat/webapps/app.war
            fi
workflows:
  version: 2
  build_and_push:
    jobs:
      - build
